services:
  todo-cda-api:
    container_name: todo-cda-api
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - todo-cda-db
    volumes:
      - ./api:/app:delegate
    networks:
      - traefik-nseven
      - todo-cda
    
  todo-cda-db:
    image: postgres:16
    container_name: todo-cda-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - todo-cda-db:/var/lib/postgresql/data
    networks:
      - todo-cda

volumes:
  todo-cda-db:

networks:
  traefik-nseven:
    external: true
  todo-cda:
