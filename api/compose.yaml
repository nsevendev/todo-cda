services:
  todo-cda-api:
    image: todo-cda-api:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: todo-cda-api
    env_file:
      - .env
    depends_on:
      - todo-cda-db
    volumes:
      - .:/app:delegate
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-nseven"
      - "traefik.http.routers.todo-cda-api.rule=Host(`todo-cda.api.local`)"
      - "traefik.http.routers.todo-cda-api.entrypoints=websecure"
      - "traefik.http.routers.todo-cda-api.tls=true"
      - "traefik.http.routers.todo-cda-api.tls.certresolver=default"
      - "traefik.http.services.todo-cda-api.loadbalancer.server.port=80"
    networks:
      - traefik-nseven
      - todo-cda
    
  todo-cda-db:
    image: postgres:16
    container_name: todo-cda-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - todo-cda-db:/var/lib/postgresql/data
    networks:
      - todo-cda

volumes:
  todo-cda-db:

networks:
  traefik-nseven:
    external: true
  todo-cda:
